name: GhostGates CI/CD Security Scan

on:
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  ghostgates-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GhostGates
        run: |
          git clone https://github.com/InfoSecHack/ghostgates.git /tmp/ghostgates
          pip install -e /tmp/ghostgates

      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GHOSTGATES_TOKEN }}
        run: |
          ghostgates scan --org ${{ github.repository_owner }} --format sarif -o results.sarif
          ghostgates scan --org ${{ github.repository_owner }} --rank

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ghostgates

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghostgates-report
          path: results.sarif
